[[permission]]
identifier = "floatbar-commands"
description = "Usage reads, surface navigation, and narrow native float-bar controls."
commands.allow = [
  "get_bootstrap_state",
  "get_settings_snapshot",
  "get_current_surface_state",
  "get_cached_providers",
  "refresh_providers",
  "refresh_providers_if_stale",
  "get_locale_strings",
  "open_settings_window",
  "hide_float_bar",
  "set_float_bar_click_through",
  "resize_float_bar",
]

[[permission]]
identifier = "flyout-commands"
description = "Usage reads and narrow navigation controls for the taskbar flyout."
commands.allow = [
  "get_bootstrap_state",
  "get_settings_snapshot",
  "get_current_surface_state",
  "get_cached_providers",
  "refresh_providers",
