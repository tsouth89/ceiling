<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ceiling — AI usage and limit tracker for Windows</title>
    <meta
      name="description"
      content="Ceiling keeps your AI usage visible in one quiet, local-first Windows app. Track Codex, Claude, Cursor, Gemini, and Copilot limits and resets from the taskbar."
    />
    <meta name="theme-color" content="#050607" />
    <link rel="canonical" href="https://ceiling.win/" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preload" as="image" href="/ceiling-taskbar.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ceiling — Stay below the ceiling." />
    <meta
      property="og:description"
      content="Track your Codex, Claude, Cursor, Gemini, and Copilot limits from the Windows taskbar."
    />
    <meta property="og:url" content="https://ceiling.win/" />
    <meta property="og:image" content="https://ceiling.win/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ceiling's taskbar capacity strip and usage overview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ceiling — AI usage and limit tracker for Windows" />
    <meta name="twitter:description" content="Track Codex, Claude, Cursor, Gemini, and Copilot limits from the Windows taskbar." />
    <meta name="twitter:image" content="https://ceiling.win/og.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Ceiling",
        "operatingSystem": "Windows",
        "applicationCategory": "UtilitiesApplication",
        "description": "A quiet, local-first Windows app that tracks your AI subscription usage, limits, and reset windows for Codex, Claude, Cursor, Gemini, and Copilot from the taskbar.",
        "url": "https://ceiling.win/",
        "downloadUrl": "https://ceiling.win/download",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <style>
      :root {
        color-scheme: dark;
        --black: #050607;
        --panel: #111315;
        --white: #e9ebe8;
        --muted: #858987;
        --edge: rgba(236, 239, 235, 0.3);
        --edge-soft: rgba(255, 255, 255, 0.08);
        font-family: "Helvetica Neue", "Arial Nova", "Segoe UI Variable Text", "Segoe UI", sans-serif;
        font-synthesis: none;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--black);
        color: var(--white);
      }

      body {
        min-height: 100svh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1440px, 100%);
        min-height: 100svh;
        margin: 0 auto;
        padding-inline: clamp(20px, 3vw, 36px);
      }

      .topbar {
        height: 78px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand,
      .github {
        display: inline-flex;
        align-items: center;
        color: #d7dad6;
        font-size: 15px;
        font-weight: 450;
        letter-spacing: -0.015em;
        text-decoration: none;
      }

      .brand {
        gap: 10px;
      }

      .brand img {
        width: 25px;
        height: 25px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
      }

      .github {
        color: #8d918e;
        font-size: 13px;
        letter-spacing: 0;
        transition: color 150ms ease;
      }

      .github:hover {
        color: var(--white);
      }

      .hero {
        display: flex;
        align-items: center;
        flex-direction: column;
        padding-top: clamp(10px, 3svh, 30px);
        text-align: center;
      }

      h1 {
        margin: 0;
        color: #a9adaa;
        font-size: clamp(16px, 1.35vw, 19px);
        font-weight: 400;
        line-height: 1.3;
        letter-spacing: -0.018em;
      }

      .tagline {
        margin: 9px 0 0;
        max-width: 46ch;
        color: var(--muted);
        font-size: 13px;
        font-weight: 400;
        line-height: 1.45;
        letter-spacing: -0.005em;
      }

      .download {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 11px;
        margin-top: 24px;
        padding: 0 20px;
        border: 1px solid rgba(222, 226, 222, 0.28);
        border-radius: 7px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.012));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
        color: #f0f2ef;
        font-size: 15px;
        font-weight: 450;
        letter-spacing: -0.012em;
        text-decoration: none;
        transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
      }

      .download:hover {
        border-color: rgba(240, 243, 239, 0.52);
        background: rgba(255, 255, 255, 0.055);
        transform: translateY(-1px);
      }

      .windows-mark {
        width: 18px;
        height: 18px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 1.5px;
        transform: perspective(20px) rotateY(-6deg);
      }

      .windows-mark span {
        display: block;
        background: currentColor;
      }

      .release {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
        letter-spacing: -0.005em;
        text-decoration: none;
        transition: color 150ms ease;
      }

      .release:hover {
        color: #aaaeaa;
      }

      .product {
        width: 100%;
        display: flex;
        align-items: center;
        flex-direction: column;
        margin-top: 27px;
      }

      .taskbar {
        width: min(620px, 94vw);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 9px;
        filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.55));
      }

      .taskbar img {
        width: 100%;
        height: auto;
        display: block;
      }

      .dashboard-frame {
        width: min(525px, 92vw);
        margin-top: 24px;
        padding: 7px;
        border: 1px solid var(--edge);
        border-radius: 24px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.018) 28%, rgba(255, 255, 255, 0.04) 100%),
          var(--panel);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.11),
          inset 0 -1px 0 rgba(0, 0, 0, 0.65),
          0 28px 70px rgba(0, 0, 0, 0.62),
          0 3px 10px rgba(0, 0, 0, 0.7);
      }

      .dashboard-inner {
        overflow: hidden;
        border: 1px solid var(--edge-soft);
        border-radius: 17px;
        background: #1b1f23;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .dashboard-inner img {
        width: 100%;
        height: auto;
        display: block;
      }

      :focus-visible {
        outline: 2px solid #dce0dc;
        outline-offset: 5px;
        border-radius: 5px;
      }

      @media (max-height: 920px) and (min-width: 600px) {
        .topbar {
          height: 64px;
        }

        .hero {
          padding-top: 4px;
        }

        .download {
          min-height: 43px;
          margin-top: 17px;
        }

        .release {
          margin-top: 10px;
        }

        .product {
          margin-top: 18px;
        }

        .taskbar {
          width: min(540px, 84vw);
        }

        .dashboard-frame {
          width: min(455px, 78vw);
          margin-top: 17px;
        }
      }

      @media (max-height: 800px) and (min-width: 600px) {
        .dashboard-frame {
          width: min(390px, 70vw);
        }

        .taskbar {
          width: min(490px, 76vw);
        }
      }

      @media (max-width: 599px) {
        .page {
          padding-inline: 14px;
        }

        .topbar {
          height: 60px;
        }

        .hero {
          padding-top: 14px;
        }

        .download {
          min-height: 44px;
          margin-top: 19px;
          padding-inline: 17px;
          font-size: 14px;
        }

        .product {
          margin-top: 24px;
        }

        .taskbar {
          width: min(525px, 96vw);
        }

        .dashboard-frame {
          width: min(525px, 96vw);
          margin-top: 18px;
          padding: 5px;
          border-radius: 18px;
        }

        .dashboard-inner {
          border-radius: 13px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .download,
        .github,
        .release {
          transition: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Ceiling home">
          <img src="/favicon.png" alt="" />
          <span>Ceiling</span>
        </a>
        <a class="github" href="https://github.com/tsouth89/ceiling">GitHub</a>
      </header>

      <main class="hero">
        <h1>Stay below the ceiling.</h1>
        <p class="tagline">
          Track your Codex, Claude, Cursor, Gemini, and Copilot limits from the Windows taskbar.
        </p>

        <a class="download" href="/download">
          <span class="windows-mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </span>
          Download for Windows
        </a>

        <a class="release" href="https://github.com/tsouth89/ceiling/releases/latest">
          Latest release · Windows · local-first
        </a>

        <section class="product" aria-label="Ceiling interface preview">
          <div class="taskbar">
            <img
              src="/ceiling-taskbar.png"
              width="863"
              height="87"
              fetchpriority="high"
              alt="Ceiling's capacity strip in the Windows taskbar, next to the weather widget"
            />
          </div>

          <div class="dashboard-frame">
            <div class="dashboard-inner">
              <img
                src="/ceiling-overview.png"
                width="569"
                height="685"
                loading="lazy"
                alt="Ceiling's overview showing Codex, Claude, and Cursor usage at a glance"
              />
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
