<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ceiling — AI usage, without the noise.</title>
    <meta
      name="description"
      content="Ceiling keeps Codex, Claude, Cursor, Gemini, and Copilot usage visible from one quiet Windows app."
    />
    <meta name="theme-color" content="#020302" />
    <link rel="canonical" href="https://ceiling.win/" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ceiling — AI usage, without the noise." />
    <meta
      property="og:description"
      content="Codex, Claude, Cursor, Gemini, and Copilot usage in one quiet Windows app."
    />
    <meta property="og:url" content="https://ceiling.win/" />
    <meta property="og:image" content="https://ceiling.win/ceiling-ui.png" />
    <meta property="og:image:width" content="659" />
    <meta property="og:image:height" content="821" />
    <meta property="og:image:alt" content="Ceiling's capacity strip and usage overview on Windows" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ceiling — AI usage, without the noise." />
    <meta
      name="twitter:description"
      content="Codex, Claude, Cursor, Gemini, and Copilot usage in one quiet Windows app."
    />
    <meta name="twitter:image" content="https://ceiling.win/ceiling-ui.png" />

    <style>
      :root {
        color-scheme: dark;
        --black: #020302;
        --white: #eceeea;
        --muted: #777b76;
        --line: #20221f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: var(--black);
        color: var(--white);
        -webkit-font-smoothing: antialiased;
      }

      body {
        min-height: 100svh;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1040px, calc(100% - 44px));
        margin: 0 auto;
      }

      header {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
      }

      .brand img {
        width: 22px;
        height: 22px;
        border-radius: 5px;
      }

      .github {
        color: var(--muted);
        font-size: 13px;
        text-decoration: none;
      }

      .github:hover {
        color: var(--white);
      }

      main {
        min-height: calc(100svh - 64px);
        display: flex;
        align-items: center;
        flex-direction: column;
        padding-top: clamp(18px, 4svh, 44px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        font-size: clamp(25px, 3vw, 34px);
        font-weight: 400;
        line-height: 1.25;
        letter-spacing: -0.025em;
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 17px;
        margin-top: 18px;
        font-family: Arial, Helvetica, sans-serif;
      }

      .download {
        min-height: 39px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 15px;
        border: 1px solid #dfe2dc;
        border-radius: 6px;
        background: #dfe2dc;
        color: #080908;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.01em;
        text-decoration: none;
      }

      .download:hover {
        background: transparent;
        color: var(--white);
      }

      .release {
        color: var(--muted);
        font-size: 12px;
        text-underline-offset: 4px;
        text-decoration-color: #3d403c;
      }

      .release:hover {
        color: var(--white);
      }

      .product {
        height: min(821px, calc(100svh - 196px));
        margin-top: 22px;
      }

      .product img {
        width: auto;
        max-width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        -webkit-mask-image: radial-gradient(ellipse 98% 98% at center, #000 76%, transparent 100%);
        mask-image: radial-gradient(ellipse 98% 98% at center, #000 76%, transparent 100%);
      }

      footer {
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        border-top: 1px solid var(--line);
        color: #565a55;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 11px;
      }

      .footer-links {
        display: flex;
        gap: 16px;
      }

      .footer-links a {
        color: #656963;
        text-decoration: none;
      }

      .footer-links a:hover {
        color: var(--white);
      }

      :focus-visible {
        outline: 2px solid var(--white);
        outline-offset: 4px;
        border-radius: 3px;
      }

      @media (max-width: 560px) {
        .shell {
          width: min(100% - 24px, 1040px);
        }

        header {
          height: 56px;
        }

        main {
          min-height: calc(100svh - 56px);
          padding-top: 20px;
        }

        h1 {
          font-size: clamp(23px, 7.4vw, 30px);
        }

        .actions {
          margin-top: 16px;
        }

        .product {
          height: min(821px, calc(100svh - 178px));
          margin-top: 17px;
        }

        footer {
          align-items: flex-start;
          flex-direction: column;
          padding: 20px 0 26px;
        }
      }
    </style>
  </head>

  <body>
    <div class="shell">
      <header>
        <a class="brand" href="/" aria-label="Ceiling home">
          <img src="/favicon.png" alt="" />
          <span>Ceiling</span>
        </a>
        <a class="github" href="https://github.com/tsouth89/ceiling">GitHub</a>
      </header>

      <main>
        <h1>AI usage, without the noise.</h1>

        <div class="actions">
          <a
            class="download"
            href="https://github.com/tsouth89/ceiling/releases/download/v0.43.2/Ceiling-0.43.2-Setup.exe"
          >Download for Windows</a>
          <a class="release" href="https://github.com/tsouth89/ceiling/releases/tag/v0.43.2">
            v0.43.2 + portable
          </a>
        </div>

        <div class="product">
          <img
            src="/ceiling-ui.png"
            width="659"
            height="821"
            alt="Ceiling's floating capacity strip and Windows dashboard showing Codex, Claude, and Cursor usage"
          />
        </div>
      </main>

      <footer>
        <span>Windows · Local-first · Open source</span>
        <div class="footer-links">
          <a href="https://github.com/tsouth89/ceiling/releases/tag/v0.43.2">Release notes</a>
          <a href="https://github.com/tsouth89/ceiling/issues">Issues</a>
        </div>
      </footer>
    </div>
  </body>
</html>
